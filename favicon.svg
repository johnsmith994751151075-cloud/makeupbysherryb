<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="32" fill="#0F0F0F"/>
  <!-- Bindi / diamond gem — gold, iconic South Asian bridal mark -->
  <polygon points="32,10 50,32 32,54 14,32" fill="none" stroke="#C9A96E" stroke-width="2"/>
  <polygon points="32,16 45,32 32,48 19,32" fill="#C9A96E" opacity="0.18"/>
  <!-- Inner dot / center gem -->
  <circle cx="32" cy="32" r="5" fill="#C9A96E"/>
  <!-- Top sparkle line -->
  <line x1="32" y1="10" x2="32" y2="16" stroke="#C9A96E" stroke-width="1.5"/>
</svg>
